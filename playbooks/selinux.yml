---
- name: Configure SELinux for WordPress and phpMyAdmin
  hosts: webservers
  become: yes
  vars_files:
    - ../vars/main.yml

  tasks:
    - name: Allow Nginx/PHP to read user home content
      command: setsebool -P httpd_read_user_content 1

    - name: Allow PHP to connect to database
      command: setsebool -P httpd_can_network_connect_db 1

    - name: Set SELinux context for web root
      command: semanage fcontext -a -t httpd_sys_content_t "{{ web_root }}(/.*)?"
      ignore_errors: yes

    - name: Set SELinux context for WordPress uploads
      command: semanage fcontext -a -t httpd_sys_rw_content_t "{{ web_root }}/wp-content(/.*)?"
      ignore_errors: yes

    - name: Apply SELinux contexts
      command: restorecon -Rv "{{ web_root }}"
