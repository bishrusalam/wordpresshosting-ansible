---
- name: Configure Nginx virtual host for WordPress
  hosts: webservers
  become: yes
  vars_files:
    - ../vars/main.yml

  tasks:

    - name: Create Nginx site configuration
      template:
        src: ../templates/nginx.conf.j2
        dest: "/etc/nginx/conf.d/myblog.conf"
      notify: Reload Nginx

    - name: Test Nginx configuration
      command: nginx -t
      changed_when: false

  handlers:
    - name: Reload Nginx
      systemd:
        name: nginx
        state: reloaded
