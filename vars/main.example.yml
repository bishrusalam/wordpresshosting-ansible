# IMPORTANT:
# Update the values below with your own credentials before running the automation script.

# Domail configuration

domain: "your-domain"
site_name: "site-name"

# Server user configuration

linux_user: "username"
linux_password: "password"
web_root: "/home/{{ linux_user }}/{{ site_name }}/public"

# Database configuration

db_name: "database-name"
db_user: "database-user"
db_password: "database-password"
mysql_root_password: "database-root-password"

# Wordpress admin configuration

wp_admin_user: "username"
wp_admin_password: "password"
wp_admin_email: "email"

# PHP version
php_version: "8.2"
